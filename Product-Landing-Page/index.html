<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MyProduct | Landing Page</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --primary: #4facfe;
      --secondary: #00f2fe;
      --dark: #111;
      --light: #ffffff;
    }

    body.dark {
      --dark: #fff;
      --light: #111;
      background: #111;
      color: #fff;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body { line-height: 1.6; }

    header {
      background: var(--dark);
      color: var(--light);
      padding: 15px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 1000;
    }

    nav a {
      color: var(--light);
      margin-left: 20px;
      text-decoration: none;
    }

    .menu-toggle { display: none; cursor: pointer; }

    .toggle-btn {
      margin-left: 20px;
      cursor: pointer;
      border: none;
      padding: 5px 10px;
    }

    .hero {
      height: 100vh;
      background: linear-gradient(to right, var(--primary), var(--secondary));
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: white;
    }

    .hero h2 { font-size: 50px; animation: fadeIn 2s; }
    .hero p { margin: 20px 0; }

    .btn {
      padding: 12px 25px;
      border-radius: 25px;
      border: none;
      cursor: pointer;
      font-weight: 600;
      transition: 0.3s;
    }

    .btn-primary {
      background: white;
      color: #333;
    }

    .btn-primary:hover {
      background: #333;
      color: white;
    }

    .features {
      padding: 60px 20px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
    }

    .feature-box {
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
      text-align: center;
      opacity: 0;
      transform: translateY(50px);
      transition: 0.6s;
    }

    .feature-box.show {
      opacity: 1;
      transform: translateY(0);
    }

    .pricing {
      padding: 60px;
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
    }

    .price-card {
      border: 1px solid #ddd;
      padding: 30px;
      border-radius: 10px;
      text-align: center;
      width: 250px;
      transition: 0.3s;
    }

    .price-card:hover { transform: scale(1.05); }

    .contact {
      padding: 60px;
      text-align: center;
    }

    input, textarea {
      width: 80%;
      padding: 10px;
      margin: 10px;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    footer {
      background: var(--dark);
      color: var(--light);
      text-align: center;
      padding: 20px;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @media(max-width:768px) {
      nav { display: none; }
      nav.active { display: flex; flex-direction: column; }
      .menu-toggle { display: block; }
    }
  </style>
</head>
<body>

<header>
  <h2>MyProduct</h2>
  <div>
    <span class="menu-toggle" onclick="toggleMenu()">☰</span>
    <button class="toggle-btn" onclick="toggleDarkMode()">🌙</button>
  </div>
  <nav id="nav">
    <a href="#">Home</a>
    <a href="#features">Features</a>
    <a href="#pricing">Pricing</a>
    <a href="#contact">Contact</a>
  </nav>
</header>

<section class="hero">
  <div>
    <h2>Boost Your Productivity</h2>
    <p>Modern solution to manage your workflow</p>
    <button class="btn btn-primary" onclick="scrollToSection('pricing')">Get Started</button>
  </div>
</section>

<section class="features" id="features">
  <div class="feature-box">Fast Performance</div>
  <div class="feature-box">Secure Data</div>
  <div class="feature-box">Easy to Use</div>
</section>

<section class="pricing" id="pricing">
  <div class="price-card">
    <h3>Basic</h3>
    <p>$10</p>
    <button class="btn btn-primary" onclick="selectPlan('Basic')">Select</button>
  </div>
  <div class="price-card">
    <h3>Pro</h3>
    <p>$25</p>
    <button class="btn btn-primary" onclick="selectPlan('Pro')">Select</button>
  </div>
</section>

<section class="contact" id="contact">
  <h2>Contact</h2>
  <input type="text" id="name" placeholder="Name"><br>
  <input type="email" id="email" placeholder="Email"><br>
  <textarea id="msg" placeholder="Message"></textarea><br>
  <button class="btn btn-primary" onclick="submitForm()">Send</button>
</section>

<footer>
  <p>© 2026 MyProduct</p>
</footer>

<script>
  function toggleMenu() {
    document.getElementById('nav').classList.toggle('active');
  }

  function toggleDarkMode() {
    document.body.classList.toggle('dark');
  }

  function scrollToSection(id) {
    document.getElementById(id).scrollIntoView({behavior:'smooth'});
  }

  function selectPlan(plan) {
    alert('Selected: ' + plan);
  }

  function submitForm() {
    let n = document.getElementById('name').value;
    let e = document.getElementById('email').value;
    let m = document.getElementById('msg').value;

    if(!n || !e || !m) {
      alert('Fill all fields');
    } else {
      alert('Message sent');
    }
  }

  // Scroll animation
  window.addEventListener('scroll', () => {
    document.querySelectorAll('.feature-box').forEach(box => {
      let pos = box.getBoundingClientRect().top;
      let screen = window.innerHeight;
      if(pos < screen - 100) {
        box.classList.add('show');
      }
    });
  });
</script>

</body>
</html>
